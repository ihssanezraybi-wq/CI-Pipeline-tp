name: CI Pipeline Multi-Jobs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  # JOB 1 - Lint
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Installer flake8
        run: pip install flake8

      - name: Exécuter lint sur app/ et tests/
        run: |
          flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
          flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests --count --max-line-length=127 --statistics

  # JOB 2 - Test
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Exécuter pytest avec couverture
        run: pytest tests/ -v --cov=app

  # JOB 3 - Build
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Générer le package Python
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: python-package
          path: dist/




